<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monalisa Interativa - Olhos Seguindo o Mouse</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Monalisa Interativa</h1>
        <p class="subtitle">Os olhos acompanham seu mouse 👀</p>
        
        <div class="canvas-container">
            <canvas id="monalisaCanvas" width="800" height="1000"></canvas>
        </div>

        <div class="info">
            <p>Mova seu mouse sobre a imagem para ver os olhos acompanharem!</p>
            <p><strong>Obra Original:</strong> Leonardo da Vinci (1503-1519)</p>
        </div>
    </div>

    <script src="monalisa.js"></script>
</body>
</html>
